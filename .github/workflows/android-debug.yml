name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Create production env
        run: |
          echo "VITE_APP_NAME=${{ secrets.VITE_APP_NAME }}" >> .env.production
          echo "VITE_AI_PROVIDER=${{ secrets.VITE_AI_PROVIDER }}" >> .env.production
          echo "VITE_AI_MODE=${{ secrets.VITE_AI_MODE }}" >> .env.production
          echo "VITE_GROQ_API_KEY=${{ secrets.VITE_GROQ_API_KEY }}" >> .env.production
          echo "VITE_GROQ_MODEL=${{ secrets.VITE_GROQ_MODEL }}" >> .env.production
          echo "VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}" >> .env.production
          echo "VITE_GEMINI_MODEL=${{ secrets.VITE_GEMINI_MODEL }}" >> .env.production
          echo "VITE_ADS_ENABLED=${{ secrets.VITE_ADS_ENABLED }}" >> .env.production
          echo "VITE_ADS_ACTION_FREQUENCY=${{ secrets.VITE_ADS_ACTION_FREQUENCY }}" >> .env.production
          echo "VITE_ADSENSE_CLIENT_ID=${{ secrets.VITE_ADSENSE_CLIENT_ID }}" >> .env.production
          echo "VITE_ADSENSE_BANNER_SLOT=${{ secrets.VITE_ADSENSE_BANNER_SLOT }}" >> .env.production
          echo "VITE_ADSENSE_ACTION_SLOT=${{ secrets.VITE_ADSENSE_ACTION_SLOT }}" >> .env.production
          echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}" >> .env.production
          echo "VITE_GOOGLE_ANDROID_CLIENT_ID=${{ secrets.VITE_GOOGLE_ANDROID_CLIENT_ID }}" >> .env.production
          echo "VITE_GOOGLE_REDIRECT_URI=${{ secrets.VITE_GOOGLE_REDIRECT_URI }}" >> .env.production

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Print APK certificate SHA1
        run: |
          keytool -printcert -jarfile android/app/build/outputs/apk/debug/app-debug.apk | grep SHA1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: capa8-tools-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk