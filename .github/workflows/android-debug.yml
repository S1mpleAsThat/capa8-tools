name: Build Android Release AAB
android-debug
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Create production env
        run: |
          echo "VITE_APP_NAME=${{ secrets.VITE_APP_NAME }}" >> .env.production
          echo "VITE_AI_PROVIDER=${{ secrets.VITE_AI_PROVIDER }}" >> .env.production
          echo "VITE_AI_MODE=${{ secrets.VITE_AI_MODE }}" >> .env.production
          echo "VITE_GROQ_API_KEY=${{ secrets.VITE_GROQ_API_KEY }}" >> .env.production
          echo "VITE_GROQ_MODEL=${{ secrets.VITE_GROQ_MODEL }}" >> .env.production
          echo "VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}" >> .env.production
          echo "VITE_GEMINI_MODEL=${{ secrets.VITE_GEMINI_MODEL }}" >> .env.production
          echo "VITE_ADS_ENABLED=${{ secrets.VITE_ADS_ENABLED }}" >> .env.production
          echo "VITE_ADS_ACTION_FREQUENCY=${{ secrets.VITE_ADS_ACTION_FREQUENCY }}" >> .env.production
          echo "VITE_ADSENSE_CLIENT_ID=${{ secrets.VITE_ADSENSE_CLIENT_ID }}" >> .env.production
          echo "VITE_ADSENSE_BANNER_SLOT=${{ secrets.VITE_ADSENSE_BANNER_SLOT }}" >> .env.production
          echo "VITE_ADSENSE_ACTION_SLOT=${{ secrets.VITE_ADSENSE_ACTION_SLOT }}" >> .env.production
          echo "VITE_ADMOB_APP_ID=${{ secrets.VITE_ADMOB_APP_ID }}" >> .env.production
          echo "VITE_ADMOB_BANNER_ID=${{ secrets.VITE_ADMOB_BANNER_ID }}" >> .env.production
          echo "VITE_ADMOB_INTERSTITIAL_ID=${{ secrets.VITE_ADMOB_INTERSTITIAL_ID }}" >> .env.production
          echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}" >> .env.production
          echo "VITE_GOOGLE_ANDROID_CLIENT_ID=${{ secrets.VITE_GOOGLE_ANDROID_CLIENT_ID }}" >> .env.production
          echo "VITE_GOOGLE_REDIRECT_URI=${{ secrets.VITE_GOOGLE_REDIRECT_URI }}" >> .env.production
          echo "VITE_GOOGLE_ANDROID_CALLBACK_URI=${{ secrets.VITE_GOOGLE_ANDROID_CALLBACK_URI }}" >> .env.production
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env.production
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env.production
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" >> .env.production

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Create Android signing files
        run: |
          mkdir -p android/app/keystore

          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore/capa8-tools-upload-key.jks

          printf "storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=keystore/capa8-tools-upload-key.jks\n" \
          "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
          "${{ secrets.ANDROID_KEY_PASSWORD }}" \
          "${{ secrets.ANDROID_KEY_ALIAS }}" \
          > android/key.properties

          printf "\nandroid.injected.signing.store.file=%s\nandroid.injected.signing.store.password=%s\nandroid.injected.signing.key.alias=%s\nandroid.injected.signing.key.password=%s\n" \
          "${{ github.workspace }}/android/app/keystore/capa8-tools-upload-key.jks" \
          "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
          "${{ secrets.ANDROID_KEY_ALIAS }}" \
          "${{ secrets.ANDROID_KEY_PASSWORD }}" \
          >> android/gradle.properties

      - name: Build signed release AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: capa8-tools-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab